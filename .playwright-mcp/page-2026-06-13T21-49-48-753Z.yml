                  - paragraph [ref=e312]: "Short answer: Real-time AI-brand monitoring across ChatGPT, Perplexity, and other AI search engines is best done with specialized AI search monitoring platforms that track mentions, citations, and prompts across multiple engines."
                  - paragraph [ref=e313]: Key points to consider
                  - list [ref=e314]:
                    - listitem [ref=e315]:
                      - paragraph [ref=e316]: "Real-time coverage: Look for tools that monitor AI outputs as they surface, not just web pages, so you can see mentions as users encounter them in ChatGPT, Perplexity, and other models. This helps you respond quickly to shifts in how your brand is represented."
                    - listitem [ref=e317]:
                      - paragraph [ref=e318]: "Cross-engine visibility: Choose solutions that aggregate brand mentions across multiple AI environments (ChatGPT, Perplexity, Gemini, Copilot, etc.) into a single dashboard for easier comparison and benchmarking."
                    - listitem [ref=e319]:
                      - paragraph [ref=e320]: "Metrics that matter: Prioritize dashboards that provide mention frequency, sentiment, citation quality, prompt-level triggers, shares of voice across AI engines, and source-citation transparency."
                    - listitem [ref=e321]:
                      - paragraph [ref=e322]: "Alerts and actionability: Prefer tools that offer real-time alerts (e.g., when your brand is mentioned in a response) and content recommendations to improve AI visibility."
                    - listitem [ref=e323]:
                      - paragraph [ref=e324]: "Pricing and scale: For SMBs, look for value-focused options with essential features; for enterprises, ensure you have robust analytics, governance, and security controls."
