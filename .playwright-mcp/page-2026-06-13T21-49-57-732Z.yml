                    - list [ref=e461]:
                      - listitem [ref=e462]:
                        - paragraph [ref=e463]: "Start with a baseline audit: identify which AI engines your audience uses most (ChatGPT, Perplexity, Gemini, Copilot) and map current brand mentions across those platforms."
                      - listitem [ref=e464]:
                        - paragraph [ref=e465]: "Deploy a multi-engine tracker: implement a monitoring tool that aggregates mentions from the major AI search/enrichment interfaces into one view."
                      - listitem [ref=e466]:
                        - paragraph [ref=e467]: "Establish KPIs: track mention rate, positive/negative sentiment, average sentiment per engine, and the share of mentions that cite your official sources."
